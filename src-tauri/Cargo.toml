[package]
name = "procnote-tauri"
version = "0.1.0"
description = "procnote - Procedure execution tool for hardware testing"
authors = ["Nomura"]
license = ""
repository = ""
edition = "2024"

[lib]
name = "procnote_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.3", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.9.5", features = [] }
tauri-plugin-log = "2"
